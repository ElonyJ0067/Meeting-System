[build]
  publish = "."
  command = "npm install && node scripts/generate-host-config.js"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/inv/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/inv_*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
